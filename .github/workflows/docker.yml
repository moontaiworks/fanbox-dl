name: Docker

on:
  workflow_call:
    inputs:
      package_version:
        description: Package version to publish, such as v1.2.3 or 1.2.3
        required: true
        type: string
  workflow_dispatch:
    inputs:
      package_version:
        description: Package version to publish, such as v1.2.3 or 1.2.3
        required: true
        type: string

permissions:
  contents: read
  packages: write

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository }}
  DOCKERHUB_IMAGE: moontai0724/fanbox-dl

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
            ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=semver,pattern={{version}},value=${{ inputs.package_version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.package_version }}
            type=semver,pattern={{major}},value=${{ inputs.package_version }}
            type=raw,value=latest

      - name: Build and publish Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          build-args: |
            PACKAGE_VERSION=${{ inputs.package_version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
